site_name: Carnet de Voyages
site_description: Carnet de voyages BAVI LEO — roadbooks générés par le bot
site_author: Christophe Danhier
site_url: https://christophedanhier-hash.github.io/voyages-wiki/

repo_name: voyages-wiki
repo_url: https://github.com/christophedanhier-hash/voyages-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    primary: blue
    accent: light blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      timezone: Europe/Brussels
      locale: fr
      fallback_to_build_date: true

nav:
  - 🌐 Portail LEO:
    - 🤖 Wiki LEO (Hermes): https://christophedanhier-hash.github.io/hermes-wiki/
    - 🏛️ BAVI LEO: https://christophedanhier-hash.github.io/BAVI_LEO/
    - 🔭 Wiki OCA: https://christophedanhier-hash.github.io/wiki-oca/
    - 📋 Tracker: https://github.com/christophedanhier-hash/leo-tracker/issues
  - Accueil: index.md
  - 🧭 Guide utilisateur: guide-utilisateur.md
  - 🧑‍✈️ Voyages Tof:
    - 🇮🇹 Italie (09/2026): italie/index.md
  - 🤖 Voyages Amis (Bot):
    - 🇻🇳🇱🇦🇰🇭 Vietnam-Laos-Cambodge (01→02/2027): vietnam-laos-cambodge-2027/index.md
    - 🇳🇴 Scandinavie (08→10/2026): scandinavie-2026/index.md
    - 🇫🇷 Canet (06/2026): weekend-canet/index.md
    - 🇪🇸 Andalousie (09→10/2026): andalousie-pauline/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/christophedanhier-hash
    - icon: fontawesome/solid/globe
      link: https://www.polarsteps.com/christophedanhier/

copyright: Roadbooks générés par le BAVI LEO Voyages Bot — Christophe Danhier
