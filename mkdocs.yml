site_name: Carnet de Voyages
site_description: Carnet de voyages de Christophe — extrait depuis Polarsteps
site_author: Christophe Danhier
site_url: https://christophedanhier-hash.github.io/voyages-wiki/

repo_name: voyages-wiki
repo_url: https://github.com/christophedanhier-hash/voyages-wiki

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/toggle-switch
        name: Light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Accueil: index.md
  - 🧑‍✈️ Voyages Tof:
    - 🇮🇹 Italie (09/2026): italie/index.md
    - 🔒 Frisia 03/2026: frisia/index.md
    - 🌐 Portugal 11/2025: portugal-lagos/index.md
    - 🌐 France - Espagne - Portugal 09/2025: france-espagne-portugal/index.md
    - 🌐 Barnave & Brasilia 06/2025: barnave-brasilia/index.md
    - 🌐 Tic&Tac Berck & Bretagne 04/2025: tic-tac-berck-bretagne/index.md
    - 🌐 Côte belge et Pays-Bas 03/2025: cote-belges-pays-bas/index.md
  - 🤖 Voyages Amis (Bot):
    - 🇳🇴 Scandinavie (08→10/2026): scandinavie-2026/index.md
    - 🇫🇷 Canet (06/2026): weekend-canet/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - footnotes
  - tables

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/christophedanhier-hash
    - icon: fontawesome/solid/globe
      link: https://www.polarsteps.com/christophedanhier/

copyright: Données extraites depuis Polarsteps — Christophe Danhier
